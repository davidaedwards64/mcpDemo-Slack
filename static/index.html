<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slack AI Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #21262d;
      font-weight: 600;
      font-size: 15px;
      color: #4A154B;
      background: #1a0a1b;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .slack-icon { font-size: 20px; }
    header .title { color: #e6edf3; }

    header .phase-badge {
      font-size: 11px;
      color: #8b949e;
      background: #21262d;
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 400;
    }

    header .spacer { flex: 1; }

    header .user-info {
      font-size: 13px;
      color: #8b949e;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .user-name { color: #e6edf3; }

    header .logout-btn {
      font-size: 12px;
      color: #8b949e;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      text-decoration: none;
    }

    header .logout-btn:hover { color: #e6edf3; border-color: #8b949e; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 720px;
      width: fit-content;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      background: #4A154B;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      background: #161b22;
      border: 1px solid #30363d;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.status {
      background: transparent;
      border: none;
      color: #8b949e;
      font-size: 13px;
      padding: 2px 0;
      align-self: flex-start;
    }

    .msg.auth-required {
      background: #161b22;
      border: 1px solid #E01E5A;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg.auth-required .auth-text {
      color: #e6edf3;
      font-size: 14px;
    }

    .msg.auth-required .auth-link {
      display: inline-block;
      background: #4A154B;
      color: #fff;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      width: fit-content;
    }

    .msg.auth-required .auth-link:hover { background: #611f69; }

    .tool-call {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 8px;
      font-size: 13px;
      max-width: 720px;
    }

    .tool-call .tool-name {
      color: #E01E5A;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .tool-call .tool-input {
      color: #8b949e;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    #input-area {
      padding: 16px 20px;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      line-height: 1.5;
    }

    #input:focus { border-color: #E01E5A; }

    #send {
      background: #4A154B;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      align-self: flex-end;
      white-space: nowrap;
    }

    #send:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #send:not(:disabled):hover { background: #611f69; }
  </style>
</head>
<body>
  <header>
    <span class="slack-icon">#</span>
    <span class="title">Slack AI Agent</span>
    <span class="phase-badge">Phase 2</span>
    <span class="spacer"></span>
    <div class="user-info">
      <span class="user-name" id="user-name"></span>
      <a class="logout-btn" href="/auth/logout">Sign out</a>
    </div>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" placeholder="Ask about your Slack workspace..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    // Load current user
    fetch('/api/me').then(r => r.json()).then(user => {
      if (!user.authenticated) {
        window.location.href = '/auth/signin';
        return;
      }
      document.getElementById('user-name').textContent = user.name || user.email;
    });

    function addMsg(cls, text) {
      const el = document.createElement('div');
      el.className = `msg ${cls}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function addAuthRequired(uri) {
      const el = document.createElement('div');
      el.className = 'msg auth-required';
      const text = document.createElement('div');
      text.className = 'auth-text';
      text.textContent = 'Slack access needs authorization. Click below to grant access, then re-send your message.';
      const link = document.createElement('a');
      link.className = 'auth-link';
      link.href = uri;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.textContent = 'Authorize Slack Access →';
      el.appendChild(text);
      el.appendChild(link);
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addToolCall(name, input) {
      const el = document.createElement('div');
      el.className = 'tool-call';
      const nameEl = document.createElement('div');
      nameEl.className = 'tool-name';
      nameEl.textContent = `⚙ ${name}`;
      const inputEl2 = document.createElement('div');
      inputEl2.className = 'tool-input';
      inputEl2.textContent = JSON.stringify(input, null, 2);
      el.appendChild(nameEl);
      el.appendChild(inputEl2);
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    sendBtn.addEventListener('click', async () => {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addMsg('user', message);

      let statusEl = null;
      let assistantEl = null;
      let assistantText = '';

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });

        if (resp.status === 401) {
          window.location.href = '/auth/signin';
          return;
        }

        if (!resp.ok) {
          addMsg('status', `Error: ${resp.status} ${resp.statusText}`);
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop();

          for (const part of parts) {
            const lines = part.trim().split('\n');
            let event = 'message', data = '';
            for (const line of lines) {
              if (line.startsWith('event: ')) event = line.slice(7);
              else if (line.startsWith('data: ')) data = line.slice(6);
            }
            if (!data) continue;

            const payload = JSON.parse(data);

            if (event === 'status') {
              if (statusEl) statusEl.remove();
              statusEl = addMsg('status', `⟳ ${payload.text}`);
            } else if (event === 'text') {
              if (statusEl) { statusEl.remove(); statusEl = null; }
              if (!assistantEl) {
                assistantEl = addMsg('assistant', '');
                assistantText = '';
              }
              assistantText += payload.text;
              assistantEl.textContent = assistantText;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (event === 'tool') {
              addToolCall(payload.name, payload.input);
              assistantEl = null;
            } else if (event === 'interaction_required') {
              if (statusEl) { statusEl.remove(); statusEl = null; }
              addAuthRequired(payload.uri);
            } else if (event === 'error') {
              if (statusEl) { statusEl.remove(); statusEl = null; }
              addMsg('status', `Error: ${payload.text}`);
            } else if (event === 'done') {
              if (statusEl) { statusEl.remove(); statusEl = null; }
            }
          }
        }
      } catch (err) {
        addMsg('status', `Error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    });

    inputEl.focus();
  </script>
</body>
</html>
